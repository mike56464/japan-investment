name: Daily Fund Scraper

on:
  schedule:
    # 台灣時間下午 15:00 (日本股市收盤後)
    - cron: '30 2 * * 1-5'
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 這裡加上了你的程式碼需要的套件
          pip install selenium supabase webdriver-manager

      - name: Run Scraper
        run: python new.py
